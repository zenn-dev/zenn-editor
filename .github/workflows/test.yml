name: Test zenn-editor

on:
  pull_request:
    branches:
      - main
      - canary
    types: [opened, synchronize]

env:
  NPM_CONFIG_REGISTRY: https://npm.flatt.tech

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.24.0

      - name: パッケージをインストール
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run tests for zenn-markdown-html
        run: pnpm test
        working-directory: packages/zenn-markdown-html

      - name: Run tests for zenn-cli
        run: pnpm test
        working-directory: packages/zenn-cli

      - name: Run tests for zenn-embed-elements
        run: pnpm test
        working-directory: packages/zenn-embed-elements
