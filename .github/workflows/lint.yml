name: Lint zenn-editor

on:
  pull_request:
    branches:
      - main
      - canary
    types: [opened, synchronize]

env:
  NPM_CONFIG_REGISTRY: https://npm.flatt.tech

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.24.0

      - name: パッケージをインストール
        run: pnpm install

      - name: Lint
        run: pnpm lint-strict
